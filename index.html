<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Comparator</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="icon" href="https://over-map.github.io/basemap/public/favicon.ico" type="image/x-icon">
    <script src="https://unpkg.com/pmtiles@2.11.0/dist/index.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --app-bg: #ffffff; 
            --card-bg: #f4f4f5; 
            --card-border: rgba(0, 0, 0, 0.08); 
            --text-main: #18181b; 
            --text-muted: #71717a; 
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.2);
            --radius-lg: 24px;
            --radius-md: 12px;
            --shadow-heavy: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-ui: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        body { 
            margin: 0; 
            padding: 16px; 
            width: 100vw;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
            background-color: var(--app-bg);
            font-family: 'Fira Sans', sans-serif;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .map-container {
            display: flex;
            width: 100%;
            height: 100%;
            gap: 16px;
            flex-direction: row;
        }

        .map-card {
            flex: 1;
            height: 100%;
            position: relative;
            background-color: var(--card-bg);
            border-radius: var(--radius-lg);
            border: 1px solid var(--card-border);
            box-shadow: var(--shadow-heavy);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            opacity: 0;
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .map-card:nth-child(1) { animation-delay: 0.1s; }
        .map-card:nth-child(2) { animation-delay: 0.3s; }
        .map-card:nth-child(3) { animation-delay: 0.5s; }

        .map-viewport {
            flex: 1;
            width: 100%;
            position: relative;
        }

        .loader-overlay {
            position: absolute;
            inset: 0;
            background-color: var(--card-bg);
            z-index: 5; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            transition: opacity 0.6s ease, visibility 0.6s ease;
            pointer-events: none;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 2px solid var(--card-border);
            border-top-color: var(--text-muted);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loader-text {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .search-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: 85%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
        }

        .search-input-wrapper {
            position: relative;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-ui);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .search-input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow), var(--shadow-ui);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            width: 16px;
            height: 16px;
            fill: var(--text-muted);
            pointer-events: none;
        }

        .search-input {
            flex: 1;
            padding: 14px 12px 14px 44px;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
            outline: none;
            min-width: 0; 
        }

        .search-input::placeholder { color: var(--text-muted); font-weight: 400; }

        .lock-btn {
            background: transparent;
            border: none;
            padding: 10px 14px;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
            border-left: 1px solid var(--card-border);
        }

        .lock-btn:hover { color: var(--text-main); }
        .lock-btn.unlocked { color: #f87171; }

        .search-results {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md);
            margin-top: 8px;
            max-height: 260px;
            overflow-y: auto;
            display: none;
            box-shadow: var(--shadow-ui);
        }

        .search-result-item, .search-state-item {
            padding: 12px 16px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-main);
            border-bottom: 1px solid var(--card-border);
            transition: background 0.1s;
        }
        .search-result-item:last-child { border-bottom: none; }
        .search-result-item:hover { background-color: rgba(0, 0, 0, 0.03); }
        .search-state-item { cursor: default; color: var(--text-muted); text-align: center; }

        .central-controls {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            pointer-events: none;
        }

        .nav-buttons {
            display: flex;
            background: rgba(0, 0, 0, 0.75); /* Darker pill for text contrast */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            box-shadow: var(--shadow-ui);
            overflow: hidden;
            pointer-events: auto;
        }

        .nav-buttons button {
            background: transparent;
            border: none;
            width: 44px;
            height: 40px;
            color: #ffffff;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-buttons button:hover { background-color: rgba(255, 255, 255, 0.1); }
        .nav-buttons button + button { border-left: 1px solid rgba(255, 255, 255, 0.1); }
        
        .credits {
            color: #ffffff; /* Requested Pure White */
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 0.3px;
            text-align: center;
            pointer-events: auto;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5); /* Safety for light maps */
        }

        .credits a {
            color: #ffffff;
            font-weight: 700;
            text-decoration: underline;
            text-underline-offset: 3px;
            text-decoration-thickness: 1px;
            transition: opacity 0.2s;
        }

        .credits a:hover { opacity: 0.8; }

        @media (max-width: 768px) {
            body { padding: 8px; }
            .map-container { flex-direction: column; gap: 8px; }
            .map-card { flex: 0 0 auto; height: calc(33.333% - 6px); border-radius: 16px; }
            .central-controls { bottom: 16px; transform: translateX(-50%) scale(0.9); }
        }
    </style>
</head>
<body>

<div class="map-container">
    <div class="map-card" id="card-0">
        <div class="search-container">
            <div class="search-input-wrapper">
                <svg class="search-icon" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
                <input type="text" class="search-input" placeholder="Search city..." data-map-id="map1">
                <button class="lock-btn" data-index="0" title="Unlock Map">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-lock"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </button>
            </div>
            <div class="search-results"></div>
        </div>
        <div id="loader-0" class="loader-overlay"><div class="spinner"></div><div class="loader-text">Syncing viewports...</div></div>
        <div id="map1" class="map-viewport"></div>
    </div>
    
    <div class="map-card" id="card-1">
        <div class="search-container">
            <div class="search-input-wrapper">
                <svg class="search-icon" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
                <input type="text" class="search-input" placeholder="Search city..." data-map-id="map2">
                <button class="lock-btn" data-index="1" title="Unlock Map">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-lock"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </button>
            </div>
            <div class="search-results"></div>
        </div>
        <div id="loader-1" class="loader-overlay"><div class="spinner"></div><div class="loader-text">Syncing viewports...</div></div>
        <div id="map2" class="map-viewport"></div>
        
        <div class="central-controls">
            <div class="nav-buttons">
                <button id="ctrl-zoom-in" title="Zoom In">+</button>
                <button id="ctrl-zoom-out" title="Zoom Out">−</button>
                <button id="ctrl-compass" title="Reset Bearing">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></svg>
                </button>
            </div>
            <div class="credits">made by <a href="https://overmap.eu" target="_blank" rel="noopener noreferrer">Filippo Imberti</a> on OSM and Esri data</div>
        </div>
    </div>
    
    <div class="map-card" id="card-2">
        <div class="search-container">
            <div class="search-input-wrapper">
                <svg class="search-icon" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
                <input type="text" class="search-input" placeholder="Search city..." data-map-id="map3">
                <button class="lock-btn" data-index="2" title="Unlock Map">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-lock"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </button>
            </div>
            <div class="search-results"></div>
        </div>
        <div id="loader-2" class="loader-overlay"><div class="spinner"></div><div class="loader-text">Syncing viewports...</div></div>
        <div id="map3" class="map-viewport"></div>
    </div>
</div>

<script>
const SVG_LOCKED = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>`;
const SVG_UNLOCKED = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>`;

const protocol = new pmtiles.Protocol();
maplibregl.addProtocol("pmtiles", async (params, callback) => {
    try {
        const response = await protocol.tile(params);
        callback(null, response, null, null);
    } catch (e) { callback(null, { data: new Uint8Array() }); }
});

async function searchLocation(query) {
    const endpoint = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`;
    try {
        const response = await fetch(endpoint, {
            headers: { 'Accept': 'application/json', 'User-Agent': 'UrbanComparator/2.0' }
        });
        return await response.json();
    } catch (error) { return []; }
}

document.addEventListener('DOMContentLoaded', () => {
    const cities = [
        { name: 'Tokyo, Japan', coords: [139.6917, 35.6895] },
        { name: 'Paris, France', coords: [2.3522, 48.8566] },
        { name: 'Moscow, Russia', coords: [37.6173, 55.7558] }
    ];

    const maps = [];
    const mapIds = ['map1', 'map2', 'map3'];
    let loadedMaps = 0;
    let syncInProgress = false;
    let isLocked = [true, true, true]; 
    let idleStatus = [false, false, false];

    function showLoaders(indices) {
        indices.forEach(i => {
            const loader = document.getElementById(`loader-${i}`);
            loader.style.visibility = 'visible';
            loader.style.opacity = '1';
            idleStatus[i] = false;
            
            clearTimeout(maps[i].fallbackTimeout);
            maps[i].fallbackTimeout = setTimeout(() => hideLoader(i), 6000);
        });
    }

    function hideLoader(i) {
        const loader = document.getElementById(`loader-${i}`);
        loader.style.opacity = '0';
        setTimeout(() => { loader.style.visibility = 'hidden'; }, 600);
    }

    function checkGlobalIdle() {
        const activeIndices = isLocked.map((l, idx) => l ? idx : -1).filter(idx => idx !== -1);
        const allIdle = activeIndices.every(idx => idleStatus[idx]);
        if (allIdle) activeIndices.forEach(idx => hideLoader(idx));
    }

    function updateSyncBaselines() {
        maps.forEach(m => {
            if(m && m.getCenter) m.initialCenter = [m.getCenter().lng, m.getCenter().lat];
        });
    }

    cities.forEach((city, index) => {
        const searchInput = document.querySelector(`input[data-map-id="${mapIds[index]}"]`);
        searchInput.value = city.name;

        const map = new maplibregl.Map({
            container: mapIds[index],
            style: 'https://over-map.github.io/urban_comparator/public/styles/style.json',
            center: city.coords,
            zoom: 8.1,
            minZoom: 8.1,
            maxZoom: 12,
            interactive: true,
            attributionControl: false 
        });

        maps.push(map);
        map.initialCenter = city.coords;

        map.on('idle', () => {
            idleStatus[index] = true;
            if (!isLocked[index]) hideLoader(index);
            else checkGlobalIdle();
        });

        const searchResults = searchInput.parentElement.nextElementSibling;
        let timeout;
        searchInput.addEventListener('input', () => {
            clearTimeout(timeout);
            const query = searchInput.value.trim();
            if (query.length < 3) { searchResults.style.display = 'none'; return; }
            searchResults.innerHTML = '<div class="search-state-item">Searching...</div>';
            searchResults.style.display = 'block';
            timeout = setTimeout(async () => {
                const results = await searchLocation(query);
                searchResults.innerHTML = '';
                if (results.length === 0) {
                    searchResults.innerHTML = '<div class="search-state-item">No locations found</div>';
                    return;
                }
                results.forEach(result => {
                    const div = document.createElement('div');
                    div.className = 'search-result-item';
                    div.textContent = result.display_name;
                    div.addEventListener('click', () => {
                        const coords = [parseFloat(result.lon), parseFloat(result.lat)];
                        const toLoad = isLocked[index] ? isLocked.map((l, i) => l ? i : -1).filter(i => i !== -1) : [index];
                        showLoaders(toLoad);
                        syncInProgress = true;
                        map.setCenter(coords);
                        updateSyncBaselines(); 
                        setTimeout(() => { syncInProgress = false; }, 50);
                        searchResults.style.display = 'none';
                        const nameParts = result.display_name.split(',');
                        searchInput.value = nameParts.length > 2 ? `${nameParts[0]}, ${nameParts[nameParts.length-1].trim()}` : result.display_name;
                    });
                    searchResults.appendChild(div);
                });
            }, 350); 
        });

        map.on('style.load', () => {
            if (map.getLayer('land-residential')) {
                map.addSource('world-mask', {
                    type: 'geojson',
                    data: { type: 'Feature', geometry: { type: 'Polygon', coordinates: [[[-180, 90], [180, 90], [180, -90], [-180, -90], [-180, 90]]] }
                    }
                });
                map.addLayer({
                    id: `white-mask-${index}`,
                    type: 'fill',
                    source: 'world-mask',
                    paint: { 'fill-color': '#ffffff', 'fill-opacity': 0.10 }
                }, 'land-residential');
                map.addSource('landcover', {
                    type: 'raster',
                    tiles: [`https://ic.imagery1.arcgis.com/arcgis/rest/services/Sentinel2_10m_LandCover/ImageServer/exportImage?bbox={bbox-epsg-3857}&bboxSR=3857&size=256%2C256&imageSR=3857&format=png&pixelType=U8&renderingRule=%7B%22rasterFunction%22%3A%22Colormap%22%2C%22rasterFunctionArguments%22%3A%7B%22Colormap%22%3A%5B%5B7%2C0%2C0%2C0%5D%5D%2C%22Raster%22%3A%22%24%24%22%7D%2C%22outputPixelType%22%3A%22U8%22%7D&f=image`],
                    tileSize: 256
                });
                map.addLayer({
                    id: `landcover-${index}`,
                    type: 'raster',
                    source: 'landcover',
                    maxzoom: 11,
                    paint: { 'raster-opacity': ['interpolate', ['linear'], ['zoom'], 10.5, 1, 11, 0] }
                }, 'land-residential');
            }
            loadedMaps++;
            if (loadedMaps === 3) {
                enableSync();
                const activeOnStart = isLocked.map((l, i) => l ? i : -1).filter(i => i !== -1);
                showLoaders(activeOnStart);
            }
        });
    });

    document.querySelectorAll('.lock-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const idx = parseInt(btn.getAttribute('data-index'));
            isLocked[idx] = !isLocked[idx];
            btn.innerHTML = isLocked[idx] ? SVG_LOCKED : SVG_UNLOCKED;
            btn.classList.toggle('unlocked', !isLocked[idx]);
            if (isLocked[idx]) updateSyncBaselines(); 
        });
    });

    function enableSync() {
        maps.forEach((map, i) => {
            map.on('move', () => {
                if (syncInProgress || !isLocked[i]) return;
                syncInProgress = true;
                const center = map.getCenter();
                const zoom = map.getZoom();
                const bearing = map.getBearing();
                const pitch = map.getPitch();
                const dx = center.lng - map.initialCenter[0];
                const dy = center.lat - map.initialCenter[1];

                maps.forEach((otherMap, j) => {
                    if (i !== j && isLocked[j]) {
                        const newLng = otherMap.initialCenter[0] + dx;
                        const newLat = otherMap.initialCenter[1] + dy;
                        otherMap.setCenter([newLng, newLat]);
                        otherMap.setZoom(zoom);
                        otherMap.setBearing(bearing);
                        otherMap.setPitch(pitch);
                    }
                });
                setTimeout(() => { syncInProgress = false; }, 0);
            });
        });
    }

    document.getElementById('ctrl-zoom-in').addEventListener('click', () => {
        const target = isLocked.indexOf(true) > -1 ? isLocked.indexOf(true) : 1;
        maps[target].zoomTo(Math.min(maps[target].getZoom() + 1, 12));
    });
    document.getElementById('ctrl-zoom-out').addEventListener('click', () => {
        const target = isLocked.indexOf(true) > -1 ? isLocked.indexOf(true) : 1;
        maps[target].zoomTo(Math.max(maps[target].getZoom() - 1, 8));
    });
    document.getElementById('ctrl-compass').addEventListener('click', () => {
        const target = isLocked.indexOf(true) > -1 ? isLocked.indexOf(true) : 1;
        maps[target].rotateTo(0);
    });

    document.addEventListener('click', (e) => {
        document.querySelectorAll('.search-results').forEach(res => {
            if (!res.parentElement.contains(e.target)) res.style.display = 'none';
        });
    });
});
</script>
</body>
</html>
